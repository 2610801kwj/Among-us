<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us Clone - High Quality Pro</title>
    <style>
        body {
            margin: 0;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #222;
            border-radius: 10px;
            box-shadow: 0 0 40px rgba(0, 0, 0, 1);
            background-color: #2b2b30;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 30px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>어몽어스 (시야 & 충돌 시스템)</h2>
        <p>조작: 방향키 또는 WASD</p>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 2000;

        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 장애물(벽) 데이터 배열
        const walls = [
            { x: 700, y: 700, w: 400, h: 100, color: '#556' },
            { x: 700, y: 800, w: 100, h: 300, color: '#556' },
            { x: 1200, y: 500, w: 150, h: 150, color: '#755' },
            { x: 400, y: 1200, w: 300, h: 200, color: '#575' }
        ];

        // 충돌 체크 함수 (AABB 방식)
        function checkCollision(x, y, w, h) {
            for (let wall of walls) {
                if (x < wall.x + wall.w &&
                    x + w > wall.x &&
                    y < wall.y + wall.h &&
                    y + h > wall.y) {
                    return true;
                }
            }
            return false;
        }

        class Player {
            constructor(x, y, color, name) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.name = name;
                this.width = 44;
                this.height = 55;
                this.speed = 6;
                this.direction = 'right';
                this.isMoving = false;
                this.walkCycle = 0;
            }

            update() {
                let dx = 0;
                let dy = 0;

                if (keys['arrowright'] || keys['d']) { dx = this.speed; this.direction = 'right'; }
                if (keys['arrowleft'] || keys['a']) { dx = -this.speed; this.direction = 'left'; }
                if (keys['arrowup'] || keys['w']) dy = -this.speed;
                if (keys['arrowdown'] || keys['s']) dy = this.speed;

                this.isMoving = (dx !== 0 || dy !== 0);

                if (dx !== 0 && dy !== 0) {
                    dx *= 0.7071;
                    dy *= 0.7071;
                }

                // X축 이동 및 충돌 체크
                let nextX = this.x + dx;
                if (!checkCollision(nextX, this.y, this.width, this.height)) {
                    this.x = Math.max(0, Math.min(nextX, WORLD_WIDTH - this.width));
                }

                // Y축 이동 및 충돌 체크
                let nextY = this.y + dy;
                if (!checkCollision(this.x, nextY, this.width, this.height)) {
                    this.y = Math.max(0, Math.min(nextY, WORLD_HEIGHT - this.height));
                }

                if (this.isMoving) {
                    this.walkCycle += 0.25;
                } else {
                    this.walkCycle = 0;
                }
            }

            draw(ctx, cameraX, cameraY) {
                const renderX = this.x - cameraX;
                const renderY = this.y - cameraY;

                // 화면 밖에 있으면 렌더링 생략 (최적화)
                if (renderX < -100 || renderX > canvas.width + 100 || 
                    renderY < -100 || renderY > canvas.height + 100) return;

                const bounce = this.isMoving ? Math.abs(Math.sin(this.walkCycle)) * 6 : 0;
                const leg1Offset = this.isMoving ? Math.max(0, Math.sin(this.walkCycle)) * 8 : 0;
                const leg2Offset = this.isMoving ? Math.max(0, -Math.sin(this.walkCycle)) * 8 : 0;

                ctx.save();
                
                // 닉네임 태그 (그림자 포함)
                ctx.fillStyle = 'white';
                ctx.font = 'bold 16px Arial';
                ctx.textAlign = 'center';
                ctx.shadowColor = 'black';
                ctx.shadowBlur = 4;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;
                ctx.fillText(this.name, renderX + this.width / 2, renderY - 15 - bounce);
                ctx.shadowColor = 'transparent'; // 그림자 초기화

                // 그림자
                const shadowScale = 1 - (bounce * 0.02);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(renderX + this.width / 2, renderY + this.height + 15, (this.width / 1.4) * shadowScale, 8 * shadowScale, 0, 0, Math.PI * 2);
                ctx.fill();

                ctx.translate(renderX, renderY - bounce);
                ctx.lineWidth = 4;
                ctx.strokeStyle = 'black';

                // 백팩
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if (this.direction === 'right') {
                    ctx.roundRect(-12, 10, 20, 35, 10);
                } else {
                    ctx.roundRect(this.width - 8, 10, 20, 35, 10);
                }
                ctx.fill(); ctx.stroke();

                // 다리
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.roundRect(5, this.height - 10 - leg1Offset, 14, 25, 7); ctx.fill(); ctx.stroke();
                ctx.beginPath(); ctx.roundRect(this.width - 19, this.height - 10 - leg2Offset, 14, 25, 7); ctx.fill(); ctx.stroke();

                // 몸통
                ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.roundRect(0, 0, this.width, this.height, 22); ctx.fill(); ctx.stroke();

                // 고글
                ctx.fillStyle = '#83c2d4';
                ctx.beginPath();
                const goggleX = this.direction === 'right' ? 12 : -6;
                ctx.roundRect(goggleX, 10, 38, 22, 11);
                ctx.fill(); ctx.stroke();

                // 고글 하이라이트
                ctx.fillStyle = '#d3eef5';
                ctx.beginPath();
                const highlightX = this.direction === 'right' ? 35 : 17;
                ctx.ellipse(highlightX, 16, 8, 4, -0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // 플레이어 및 NPC 생성
        const player = new Player(1000, 1000, '#c51111', 'Player');
        const npcs = [
            new Player(800, 800, '#1122cc', 'Blue'),
            new Player(1300, 600, '#11cc22', 'Green'),
            new Player(500, 1300, '#ffcc00', 'Yellow')
        ];

        let camera = { x: 0, y: 0 };

        function drawMap(ctx, cameraX, cameraY) {
            const tileSize = 100;
            const startCol = Math.floor(cameraX / tileSize);
            const endCol = startCol + (canvas.width / tileSize) + 1;
            const startRow = Math.floor(cameraY / tileSize);
            const endRow = startRow + (canvas.height / tileSize) + 1;

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#222';

            for (let c = startCol; c <= endCol; c++) {
                for (let r = startRow; r <= endRow; r++) {
                    const tileX = c * tileSize - cameraX;
                    const tileY = r * tileSize - cameraY;

                    if (c * tileSize < 0 || c * tileSize >= WORLD_WIDTH || 
                        r * tileSize < 0 || r * tileSize >= WORLD_HEIGHT) {
                        ctx.fillStyle = '#000';
                    } else {
                        ctx.fillStyle = (c + r) % 2 === 0 ? '#45454d' : '#4a4a52';
                    }
                    
                    ctx.fillRect(tileX, tileY, tileSize, tileSize);
                    ctx.strokeRect(tileX, tileY, tileSize, tileSize);
                }
            }
        }

        function drawWalls(ctx, cameraX, cameraY) {
            ctx.lineWidth = 6;
            ctx.strokeStyle = '#222';
            for (let wall of walls) {
                const renderX = wall.x - cameraX;
                const renderY = wall.y - cameraY;
                
                // 3D 느낌을 살짝 주기 위해 그림자(측면) 추가
                ctx.fillStyle = '#334';
                ctx.fillRect(renderX, renderY + 10, wall.w, wall.h);

                ctx.fillStyle = wall.color;
                ctx.fillRect(renderX, renderY, wall.w, wall.h);
                ctx.strokeRect(renderX, renderY, wall.w, wall.h);
            }
        }

        // 시야 제한(어두운 조명 효과) 그리기
        function drawVision(ctx) {
            ctx.save();
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;

            // 중앙은 투명하고 바깥으로 갈수록 까맣게 변하는 그라데이션
            const gradient = ctx.createRadialGradient(
                centerX, centerY, 80,   // 밝은 영역 반경
                centerX, centerY, 350   // 완전히 어두워지는 반경
            );
            gradient.addColorStop(0, 'rgba(0, 0, 0, 0)');
            gradient.addColorStop(0.5, 'rgba(0, 0, 0, 0.6)');
            gradient.addColorStop(1, 'rgba(0, 0, 0, 0.98)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.restore();
        }

        function gameLoop() {
            player.update();

            const targetCameraX = player.x + player.width / 2 - canvas.width / 2;
            const targetCameraY = player.y + player.height / 2 - canvas.height / 2;
            camera.x += (targetCameraX - camera.x) * 0.1;
            camera.y += (targetCameraY - camera.y) * 0.1;

            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            drawMap(ctx, camera.x, camera.y);
            drawWalls(ctx, camera.x, camera.y);

            // NPC와 플레이어 렌더링 (Y축 기준으로 정렬하여 겹칠 때 자연스럽게 보이게 함)
            const allCharacters = [...npcs, player].sort((a, b) => a.y - b.y);
            allCharacters.forEach(char => char.draw(ctx, camera.x, camera.y));

            // 가장 마지막에 조명 효과 덮어씌우기
            drawVision(ctx);

            requestAnimationFrame(gameLoop);
        }

        gameLoop();
    </script>
</body>
</html>
