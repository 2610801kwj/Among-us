<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght=700;900&display=swap');
        body { margin: 0; background-color: #050505; color: white; font-family: 'Nunito', sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; }
        
        /* 공통 UI 패널 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .panel { background: rgba(15, 15, 25, 0.96); padding: 40px; border-radius: 20px; border: 3px solid #4f5d73; pointer-events: auto; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.9); backdrop-filter: blur(15px); }
        h1 { margin-top: 0; color: #ff4757; font-size: 2.5rem; text-shadow: 3px 3px 0 #000; letter-spacing: 2px; }
        
        input { padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #555; text-align: center; margin-bottom: 20px; width: 250px; text-transform: uppercase; background: #2f3542; color: white; font-family: 'Nunito', sans-serif; font-weight: bold; outline: none; }
        button { padding: 15px 30px; font-size: 18px; font-weight: 900; background: #1dd1a1; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; margin: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-host { background: #ff4757; }
        
        /* 인게임 UI */
        #game-ui { position: absolute; top: 20px; left: 20px; pointer-events: none; display: none; text-shadow: 2px 2px 4px black; z-index: 5; }
        #room-info { font-size: 20px; color: #1dd1a1; margin-bottom: 5px; }
        #player-list { font-size: 16px; color: #ced6e0; margin-bottom: 15px; }
        #task-bar-container { width: 300px; height: 20px; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: none; }
        #task-bar-fill { width: 0%; height: 100%; background: #2ed573; transition: width 0.3s; }
        #host-start-btn { pointer-events: auto; display: none; background: #ffa502; margin-top: 10px; }
        #sabotage-alert { color: #ff4757; font-size: 20px; font-weight: 900; display: none; animation: blink 1s infinite; }
        
        /* 미니맵 레이아웃 */
        #minimap-container { position: absolute; top: 20px; right: 20px; width: 160px; height: 160px; background: rgba(5,5,10,0.85); border: 3px solid #4f5d73; border-radius: 10px; overflow: hidden; display: none; z-index: 4; box-shadow: 0 0 15px rgba(0,0,0,0.5); }
        #minimap-canvas { width: 100%; height: 100%; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
        
        /* 액션 버튼 */
        #action-container { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 15px; z-index: 5; }
        .action-btn { width: 85px; height: 85px; border-radius: 50%; font-weight: 900; font-size: 13px; display: none; text-align: center; border: 4px solid; color: white; cursor: pointer; pointer-events: auto; transition: 0.2s; flex-direction: column; justify-content: center; align-items: center; box-shadow: 0 8px 15px rgba(0,0,0,0.5); }
        #kill-btn { background: rgba(255, 71, 87, 0.5); border-color: #ff4757; }
        #report-btn { background: rgba(255, 165, 2, 0.5); border-color: #ffa502; }
        #task-btn { background: rgba(46, 213, 115, 0.5); border-color: #2ed573; }
        #vent-btn { background: rgba(116, 125, 140, 0.5); border-color: #747d8c; }
        #sabotage-btn { background: rgba(165, 94, 234, 0.5); border-color: #a55eea; }
        .action-btn.disabled { opacity: 0.4; pointer-events: none; background: rgba(40,40,40,0.5) !important; border-color: #555 !important; }
        
        /* 투표 + 채팅 UI */
        #voting-ui { display: none; background: rgba(5, 5, 10, 0.98); }
        .voting-wrapper { display: flex; width: 950px; height: 550px; background: #1a1d24; border-radius: 20px; border: 3px solid #4f5d73; pointer-events: auto; overflow: hidden; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        .voting-left { flex: 1.2; padding: 25px; display: flex; flex-direction: column; justify-content: space-between; border-right: 2px solid #2f3640; }
        .vote-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; overflow-y: auto; max-height: 380px; padding-right: 5px; }
        .vote-card { background: #252830; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 3px solid transparent; color: white; transition: 0.2s; }
        .vote-card:hover:not(.dead) { border-color: #1dd1a1; background: #2c313d; }
        .vote-card.selected { border-color: #ff4757; background: #42282b; }
        .vote-card.dead { opacity: 0.3; pointer-events: none; filter: grayscale(100%); }
        .vote-color-box { width: 20px; height: 20px; border-radius: 5px; margin-right: 10px; }
        
        .voting-right { flex: 0.8; padding: 20px; display: flex; flex-direction: column; background: #111318; }
        #chat-box { flex: 1; background: #08090c; border-radius: 10px; padding: 15px; overflow-y: auto; margin-bottom: 10px; text-align: left; font-size: 14px; border: 1px solid #222; }
        .chat-input-row { display: flex; gap: 8px; }
        #chat-input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid #444; background: #1e2127; color: white; font-size: 14px; margin-bottom: 0; text-transform: none; text-align: left; }
        #chat-send-btn { padding: 10px 15px; font-size: 14px; margin: 0; border-radius: 5px; }

        /* 리포트 컷신 오버레이 */
        #cutscene-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 99; pointer-events: auto; }
        #cutscene-text { font-size: 3.5rem; font-weight: 900; color: #ff4757; text-shadow: 0 0 20px rgba(255,71,87,0.6); animation: punch 0.5s ease-out forwards; }
        @keyframes punch { 0% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

        /* 미니게임 테스크 팝업 창 (전선 연결 인터랙션) */
        #minigame-popup { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #1e2127; width: 500px; height: 400px; border: 4px solid #4e5d73; border-radius: 15px; z-index: 100; box-shadow: 0 0 50px rgba(0,0,0,0.9); pointer-events: auto; }
        #wire-canvas { width: 100%; height: 100%; background: #111318; border-radius: 11px; display: block; }
        #close-task-btn { position: absolute; top: 10px; right: 10px; background: #ff4757; color: white; border: none; padding: 5px 12px; border-radius: 5px; cursor: pointer; font-weight: bold; }

        #game-over-ui { display: none; }
        #winner-text { font-size: 4rem; margin-bottom: 30px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="game-ui">
        <div id="room-info"></div>
        <div id="player-list"></div>
        <div id="task-bar-container"><div id="task-bar-fill"></div></div>
        <div id="sabotage-alert">⚠️ 정전 발생! 전기실(레이더 적색지대)에서 복구하세요!</div>
        <div id="role-info">대기실 (Lobby)</div>
        <button id="host-start-btn" onclick="hostStartGame()">🚀 게임 시작 (최소 5명)</button>
    </div>

    <div id="minimap-container">
        <canvas id="minimap-canvas" width="160" height="160"></canvas>
    </div>

    <div id="cutscene-overlay">
        <div id="cutscene-text">🚨 DEAD BODY REPORTED</div>
    </div>

    <div id="action-container">
        <div id="task-btn" class="action-btn">TASK<br>[ E ]</div>
        <div id="vent-btn" class="action-btn">VENT<br>[ V ]</div>
        <div id="sabotage-btn" class="action-btn">LIGHTS<br>[ G ]</div>
        <div id="report-btn" class="action-btn">REPORT<br>[ R ]</div>
        <div id="kill-btn" class="action-btn">KILL<br>[ SPACE ]</div>
    </div>

    <div id="minigame-popup">
        <button id="close-task-btn" onclick="closeMinigame()">X</button>
        <canvas id="wire-canvas" width="500" height="400"></canvas>
    </div>

    <div class="overlay" id="menu-ui">
        <div class="panel">
            <h1>AMONG US</h1>
            <input type="text" id="nickname" placeholder="닉네임 입력" maxlength="8" value="Player">
            <hr style="border-color:#444; margin: 20px 0;">
            <button class="btn-host" onclick="createRoom()">방 만들기 (호스트)</button><br><br>
            <input type="text" id="room-code" placeholder="입장 코드 5자리" maxlength="5"><br>
            <button onclick="joinRoom()">방 입장 (게스트)</button>
        </div>
    </div>

    <div class="overlay" id="voting-ui">
        <div class="voting-wrapper">
            <div class="voting-left">
                <h2 style="color: #ff4757; margin: 0 0 15px 0; text-align: center;">🚨 긴급 재판 진행 중 🚨</h2>
                <div class="vote-grid" id="vote-grid"></div>
                <button onclick="castVote('SKIP')" style="background: #747d8c; width: 100%; margin-top: 15px;">투표 건너뛰기 (Skip)</button>
            </div>
            <div class="voting-right">
                <h3 style="margin: 0 0 10px 0; color: #1dd1a1;">💬 회의 채팅방</h3>
                <div id="chat-box"></div>
                <div class="chat-input-row">
                    <input type="text" id="chat-input" placeholder="메시지를 입력하세요..." onkeydown="if(event.key==='Enter') sendChatMessage()">
                    <button id="chat-send-btn" onclick="sendChatMessage()">전송</button>
                </div>
            </div>
        </div>
    </div>

    <div class="overlay" id="game-over-ui">
        <div class="panel" style="background: transparent; border: none; box-shadow: none;">
            <div id="winner-text"></div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        const playerImg = new Image();
        playerImg.src = './1734.png'; 
        
        let animTimer = 0, lastTime = Date.now();
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const mCanvas = document.getElementById('minimap-canvas');
        const mCtx = mCanvas.getContext('2d');

        // 미션 전선 캔버스 변수
        const wCanvas = document.getElementById('wire-canvas');
        const wCtx = wCanvas.getContext('2d');

        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(type) {
            try {
                let osc = audioCtx.createOscillator(); let gain = audioCtx.createGain();
                osc.connect(gain); gain.connect(audioCtx.destination);
                if (type === 'kill') {
                    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(160, audioCtx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.2);
                    gain.gain.setValueAtTime(0.4, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.2);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.2);
                } else if (type === 'report') {
                    osc.type = 'triangle'; osc.frequency.setValueAtTime(580, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.15);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.4);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                } else if (type === 'sabotage') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(220, audioCtx.currentTime);
                    osc.frequency.linearRampToValueAtTime(110, audioCtx.currentTime + 0.5);
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.6);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.6);
                } else if (type === 'task') {
                    osc.type = 'sine'; osc.frequency.setValueAtTime(523.25, audioCtx.currentTime);
                    osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1);
                    gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.35);
                    osc.start(); osc.stop(audioCtx.currentTime + 0.35);
                }
            } catch(e){}
        }

        const COLORS = ['#c51111', '#132ed1', '#117f2d', '#ed54ba', '#ef7d0d', '#f5f557', '#3f474e', '#d6e0f0', '#6b2fbb', '#71491e', '#38fedc', '#50ef39'];
        const WORLD_SIZE = 2500;
        let peer = null, isHost = false, myId = null, hostConn = null, clients = {};
        
        // [1번 요구사항 반영] 방 구조 및 미로 형태의 좁은 복도를 가진 구조적 벽 레이아웃
        const walls = [
            // 외곽 테두리 기둥 경계선
            { x: 0, y: 0, w: 2500, h: 40 }, { x: 0, y: 0, w: 40, h: 2500 },
            { x: 0, y: 2460, w: 2500, h: 40 }, { x: 2460, y: 0, w: 40, h: 2500 },
            
            // 중앙 식당 분할 격벽 (Cafeteria Walls)
            { x: 900, y: 800, w: 40, h: 800, type: 'engine' },
            { x: 1560, y: 800, w: 40, h: 800, type: 'engine' },
            { x: 900, y: 800, w: 250, h: 40, type: 'reactor' },
            { x: 1350, y: 800, w: 250, h: 40, type: 'reactor' },
            { x: 900, y: 1560, w: 700, h: 40, type: 'storage' },

            // 좌측 상단 전기실 격방 복도 (Electrical Structure)
            { x: 40, y: 600, w: 500, h: 40, type: 'storage' },
            { x: 500, y: 640, w: 40, h: 400, type: 'reactor' },

            // 우측 원자로 구역 미로 벽 (Reactor Corridors)
            { x: 1900, y: 40, w: 40, h: 1000, type: 'engine' },
            { x: 1900, y: 1300, w: 40, h: 800, type: 'engine' }
        ];

        // 방 성격에 맞춤형 배치된 미션 테스크 존
        const taskZones = [
            { id: 1, x: 200, y: 800, w: 140, h: 140, name: "전기실 전선 수리", color: "rgba(46, 213, 115, 0.25)" },
            { id: 2, x: 2100, y: 400, w: 140, h: 140, name: "원자로 데이터 연동", color: "rgba(52, 152, 219, 0.25)" },
            { id: 99, x: 150, y: 200, w: 140, h: 140, name: "⚡ 배선 제어기 (정전 복구)", color: "rgba(235, 94, 85, 0.25)" }
        ];
        const vents = [{ id: 0, x: 250, y: 750 }, { id: 1, x: 2150, y: 350 }, { id: 2, x: 1200, y: 900 }];

        let gameState = { 
            phase: 'Lobby', imposters: [], players: {}, corpses: [], 
            tasksTotal: 0, tasksCompleted: 0, votes: {}, winner: "",
            isLightsOut: false, sabotageCooldown: 0
        };
        let myLocalTasks = [], myVote = null, currentTaskId = null;

        // [2번 요구사항 반영] 전선 연결 인터랙션을 위한 마우스 드래깅 구조체 상태 관리
        const WIRE_COLORS = ['#ff4757', '#2ed573', '#1e90ff', '#ffa502']; // 빨, 녹, 파, 노
        let wireTaskState = {
            leftWires: [],   // { color, y, connectedIndex }
            rightWires: [],  // { color, y }
            activeDragIndex: -1,
            mouseX: 0, mouseY: 0
        };

        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', e => {
            if(document.activeElement === document.getElementById('chat-input')) return;
            const k = e.key.toLowerCase(); if (keys.hasOwnProperty(k)) keys[k] = true;
            if (gameState.phase !== 'Playing' || !myId || !gameState.players[myId] || gameState.players[myId].isDead) return;
            if (k === ' ') sendAction('kill'); if (k === 'r') sendAction('report'); if (k === 'e') performTask(); if (k === 'v') toggleVent(); if (k === 'g') sendAction('sabotage_lights');
        });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        function sendAction(a) { isHost ? processAction(myId, a) : hostConn?.send({ type: 'action', action: a }); }

        function createRoom() {
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            peer = new Peer('AMONG-' + code);
            peer.on('open', (id) => {
                isHost = true; myId = id;
                document.getElementById('menu-ui').style.display = 'none'; document.getElementById('game-ui').style.display = 'block';
                document.getElementById('minimap-container').style.display = 'block';
                document.getElementById('room-info').innerText = `🏠 방 코드: ${code}`;
                addPlayer(myId, document.getElementById('nickname').value || 'Host');
                startGameLoop();
            });
            peer.on('connection', (conn) => {
                conn.on('open', () => {
                    clients[conn.peer] = conn;
                    conn.on('data', (data) => {
                        if (data.type === 'join') addPlayer(conn.peer, data.name);
                        else if (data.type === 'input') handleMovement(conn.peer, data.keys);
                        else if (data.type === 'action') processAction(conn.peer, data.action);
                        else if (data.type === 'vote') handleVote(conn.peer, data.targetId);
                        else if (data.type === 'chat') relayChatMessage(conn.peer, data.msg);
                        else if (data.type === 'task_complete') { gameState.tasksCompleted++; checkWinCondition(); playSound('task'); }
                        else if (data.type === 'vent_toggle') handleVentToggle(conn.peer);
                    });
                });
            });
        }

        function joinRoom() {
            let code = document.getElementById('room-code').value.toUpperCase().trim();
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id; hostConn = peer.connect('AMONG-' + code);
                hostConn.on('open', () => {
                    document.getElementById('menu-ui').style.display = 'none'; document.getElementById('game-ui').style.display = 'block';
                    document.getElementById('minimap-container').style.display = 'block';
                    hostConn.send({ type: 'join', name: document.getElementById('nickname').value || 'Crewmate' });
                    startGameLoop();
                });
                hostConn.on('data', (data) => { 
                    if (data.type === 'state') updateLocalState(data.state); 
                    if (data.type === 'chat_broadcast') appendChatMessage(data.senderName, data.msg, data.color);
                    if (data.type === 'sound') playSound(data.soundType);
                    if (data.type === 'cutscene') triggerCutsceneUI();
                });
            });
        }

        function addPlayer(id, name) {
            const used = Object.values(gameState.players).map(p => p.color);
            const color = COLORS.find(c => !used.includes(c)) || '#ffffff';
            gameState.players[id] = { x: 1200, y: 1200, color, name, isDead: false, facing: 1, isMoving: false, inVent: -1 };
        }

        function hostStartGame() {
            const pIds = Object.keys(gameState.players);
            if (pIds.length < 1) return;
            gameState.phase = 'Playing'; gameState.corpses = []; gameState.votes = {}; gameState.isLightsOut = false;
            gameState.sabotageCooldown = 10; gameState.tasksCompleted = 0; gameState.tasksTotal = pIds.length * (taskZones.length - 1);
            gameState.imposters = [pIds[Math.floor(Math.random() * pIds.length)]];
            pIds.forEach(id => { gameState.players[id].x = 1100 + Math.random()*200; gameState.players[id].y = 1100 + Math.random()*200; gameState.players[id].isDead = false; gameState.players[id].inVent = -1; });
            document.getElementById('chat-box').innerHTML = '';
        }

        function checkCollision(x, y, size) {
            if (x - size < 0 || x + size > WORLD_SIZE || y - size < 0 || y + size > WORLD_SIZE) return true;
            for (let w of walls) { if (x + size > w.x && x - size < w.x + w.w && y + size > w.y && y - size < w.y + w.h) return true; }
            return false;
        }

        function handleMovement(id, k) {
            const p = gameState.players[id]; if (!p || p.isDead || gameState.phase !== 'Playing') return;
            if (p.inVent !== -1) {
                let nextVent = p.inVent;
                if (k.d || k.s) { nextVent = (p.inVent + 1) % vents.length; keys.d = keys.s = false; }
                if (k.a || k.w) { nextVent = (p.inVent - 1 + vents.length) % vents.length; keys.a = keys.w = false; }
                if (nextVent !== p.inVent) { p.inVent = nextVent; p.x = vents[nextVent].x; p.y = vents[nextVent].y; }
                return;
            }
            let dx = 0, dy = 0, speed = 5.5;
            if (k.w) dy -= speed; if (k.s) dy += speed;
            if (k.a) { dx -= speed; p.facing = -1; } if (k.d) { dx += speed; p.facing = 1; }
            if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
            p.isMoving = (dx !== 0 || dy !== 0);
            if (!checkCollision(p.x + dx, p.y, 16)) p.x += dx; if (!checkCollision(p.x, p.y + dy, 16)) p.y += dy;
        }

        function handleVentToggle(id) {
            const p = gameState.players[id]; if (!p || p.isDead) return;
            if (p.inVent !== -1) { p.inVent = -1; } 
            else { vents.forEach(v => { if (Math.hypot(p.x - v.x, p.y - v.y) < 60) { p.inVent = v.id; p.x = v.x; p.y = v.y; } }); }
        }
        function toggleVent() { if (!gameState.imposters.includes(myId)) return; isHost ? handleVentToggle(myId) : hostConn.send({ type: 'vent_toggle' }); }

        function checkInSight(voterX, voterY, targetX, targetY, isImposterVoter = false) {
            let baseRadius = (gameState.isLightsOut && !isImposterVoter) ? 110 : 360;
            return Math.hypot(voterX - targetX, voterY - targetY) <= baseRadius;
        }

        function processAction(id, action) {
            const p = gameState.players[id]; if (!p || p.isDead) return;
            if (action === 'kill' && gameState.imposters.includes(id) && p.inVent === -1) {
                for (let tId in gameState.players) {
                    if (tId !== id && !gameState.players[tId].isDead && !gameState.imposters.includes(tId) && gameState.players[tId].inVent === -1 && Math.hypot(p.x - gameState.players[tId].x, p.y - gameState.players[tId].y) < 120) {
                        gameState.players[tId].isDead = true;
                        gameState.corpses.push({ x: gameState.players[tId].x, y: gameState.players[tId].y, color: gameState.players[tId].color });
                        broadcastSound('kill'); checkWinCondition(); break;
                    }
                }
            } else if (action === 'report' && p.inVent === -1) {
                for (let c of gameState.corpses) {
                    if (Math.hypot(p.x - c.x, p.y - c.y) < 150) { broadcastCutscene(); startMeeting(); break; }
                }
            } else if (action === 'sabotage_lights' && gameState.imposters.includes(id)) {
                if (gameState.sabotageCooldown <= 0 && !gameState.isLightsOut) { gameState.isLightsOut = true; gameState.sabotageCooldown = 25; broadcastSound('sabotage'); }
            } else if (action === 'fix_lights_complete') { gameState.isLightsOut = false; }
        }

        function broadcastSound(st) { playSound(st); for(let cid in clients) clients[cid].send({type:'sound', soundType:st}); }
        function broadcastCutscene() { triggerCutsceneUI(); for(let cid in clients) clients[cid].send({type:'cutscene'}); }
        
        function triggerCutsceneUI() {
            playSound('report');
            const cut = document.getElementById('cutscene-overlay'); cut.style.display = 'flex';
            setTimeout(() => cut.style.display = 'none', 2500);
        }

        function checkWinCondition() {
            let aliveCrew = 0, aliveImps = 0;
            for (let id in gameState.players) { if (!gameState.players[id].isDead) gameState.imposters.includes(id) ? aliveImps++ : aliveCrew++; }
            if (aliveImps === 0) triggerGameOver("CREWMATE WIN");
            else if (aliveImps >= aliveCrew) triggerGameOver("IMPOSTER WIN");
            else if (gameState.tasksCompleted >= gameState.tasksTotal) triggerGameOver("TASK WIN");
        }
        function triggerGameOver(text) { gameState.phase = 'GameOver'; gameState.winner = text; setTimeout(() => { gameState.phase = 'Lobby'; myLocalTasks = []; }, 5000); }

        function startMeeting() {
            gameState.phase = 'Voting'; gameState.votes = {}; gameState.isLightsOut = false; closeMinigame();
            for (let id in gameState.players) if (!gameState.players[id].isDead) { gameState.players[id].x = 1200; gameState.players[id].y = 1200; gameState.players[id].inVent = -1; }
        }

        function handleVote(voterId, targetId) {
            if (!gameState.votes[voterId]) {
                gameState.votes[voterId] = targetId;
                if (Object.keys(gameState.votes).length >= Object.values(gameState.players).filter(p=>!p.isDead).length) tallyVotes();
            }
        }
        function tallyVotes() {
            let counts = {}; for (let v in gameState.votes) counts[gameState.votes[v]] = (counts[gameState.votes[v]] || 0) + 1;
            let max = 0, ejected = null;
            for (let id in counts) if (counts[id] > max) { max = counts[id]; ejected = id; }
            if (ejected && ejected !== 'SKIP') gameState.players[ejected].isDead = true;
            gameState.corpses = []; checkWinCondition(); if (gameState.phase === 'Voting') gameState.phase = 'Playing';
        }

        function sendChatMessage() {
            const input = document.getElementById('chat-input'); const msg = input.value.trim(); if(!msg) return;
            if(isHost) { relayChatMessage(myId, msg); } else { hostConn.send({ type: 'chat', msg: msg }); }
            input.value = '';
        }
        function relayChatMessage(senderId, msg) {
            const sender = gameState.players[senderId]; if(!sender) return;
            appendChatMessage(sender.name, msg, sender.color);
            for(let cid in clients) clients[cid].send({ type: 'chat_broadcast', senderName: sender.name, msg: msg, color: sender.color });
        }
        function appendChatMessage(name, msg, color) {
            const box = document.getElementById('chat-box');
            const div = document.createElement('div'); div.className = 'chat-msg';
            div.innerHTML = `<strong style="color:${color}">${name}</strong>: <span style="color:#fff">${msg}</span>`;
            box.appendChild(div); box.scrollTop = box.scrollHeight;
        }

        function updateLocalState(newState) {
            const oldPhase = gameState.phase; gameState = newState;
            if (oldPhase !== 'Voting' && gameState.phase === 'Voting') showVotingUI();
            if (oldPhase === 'Voting' && gameState.phase === 'Playing') document.getElementById('voting-ui').style.display = 'none';
            if (gameState.phase === 'GameOver') { document.getElementById('game-over-ui').style.display = 'flex'; document.getElementById('winner-text').innerText = gameState.winner; document.getElementById('voting-ui').style.display = 'none'; closeMinigame(); }
            if (gameState.phase === 'Lobby') document.getElementById('game-over-ui').style.display = 'none';
        }

        // [2번 요구사항 반영] 전선 타이틀 미니게임 생성기 함수 연산
        function initWireTask() {
            let lefts = [...WIRE_COLORS].sort(() => Math.random() - 0.5);
            let rights = [...WIRE_COLORS].sort(() => Math.random() - 0.5);
            wireTaskState.leftWires = lefts.map((color, i) => ({ color, y: 80 + i * 80, connectedIndex: -1 }));
            wireTaskState.rightWires = rights.map((color, i) => ({ color, y: 80 + i * 80 }));
            wireTaskState.activeDragIndex = -1;
            renderWireGame();
        }

        function performTask() {
            const me = gameState.players[myId]; if (me.isDead || me.inVent !== -1) return;
            for (let t of taskZones) {
                if (me.x > t.x && me.x < t.x+t.w && me.y > t.y && me.y < t.y+t.h) {
                    if (t.id === 99) { if (!gameState.isLightsOut) return; } 
                    else { if (gameState.imposters.includes(myId) || myLocalTasks.includes(t.id)) return; }
                    
                    currentTaskId = t.id;
                    document.getElementById('minigame-popup').style.display = 'block';
                    initWireTask(); break;
                }
            }
        }

        function closeMinigame() { document.getElementById('minigame-popup').style.display = 'none'; currentTaskId = null; }

        // [2번 요구사항] 전선 인터랙션 가속 캔버스 드로잉 엔진 구현
        function renderWireGame() {
            wCtx.clearRect(0, 0, 500, 400);
            wCtx.fillStyle = '#1e1f29'; wCtx.fillRect(0,0,500,400);

            wCtx.fillStyle = 'white'; wCtx.font = 'bold 20px Nunito'; wCtx.textAlign = 'center';
            wCtx.fillText(currentTaskId === 99 ? "⚡ EMERGENCY POWER OVERRIDE" : "🔧 FIX WIRING TASK", 250, 35);

            // 좌우 커넥터 박스 단자 그리기
            wireTaskState.leftWires.forEach((w, i) => {
                wCtx.fillStyle = w.color; wCtx.fillRect(10, w.y - 15, 40, 30);
                wCtx.fillStyle = '#000'; wCtx.fillRect(40, w.y - 5, 10, 10);
            });
            wireTaskState.rightWires.forEach((w, i) => {
                wCtx.fillStyle = w.color; wCtx.fillRect(450, w.y - 15, 40, 30);
                wCtx.fillStyle = '#000'; wCtx.fillRect(450, w.y - 5, 10, 10);
            });

            // 이미 연결된 선 고정 렌더링
            wireTaskState.leftWires.forEach((w, i) => {
                wCtx.lineWidth = 6; wCtx.strokeStyle = w.color;
                if(w.connectedIndex !== -1) {
                    let rx = 450; let ry = wireTaskState.rightWires[w.connectedIndex].y;
                    wCtx.beginPath(); wCtx.moveTo(50, w.y); wCtx.lineTo(rx, ry); wCtx.stroke();
                } else if(wireTaskState.activeDragIndex === i) {
                    wCtx.beginPath(); wCtx.moveTo(50, w.y); wCtx.lineTo(wireTaskState.mouseX, wireTaskState.mouseY); wCtx.stroke();
                }
            });
        }

        // 전선 인터랙션 마우스 리스너 바인딩
        wCanvas.addEventListener('mousedown', e => {
            let rect = wCanvas.getBoundingClientRect();
            let mx = e.clientX - rect.left; let my = e.clientY - rect.top;
            wireTaskState.leftWires.forEach((w, i) => {
                if(w.connectedIndex === -1 && mx >= 10 && mx <= 60 && Math.abs(my - w.y) < 20) {
                    wireTaskState.activeDragIndex = i;
                }
            });
        });
        wCanvas.addEventListener('mousemove', e => {
            let rect = wCanvas.getBoundingClientRect();
            wireTaskState.mouseX = e.clientX - rect.left; wireTaskState.mouseY = e.clientY - rect.top;
            if(wireTaskState.activeDragIndex !== -1) renderWireGame();
        });
        wCanvas.addEventListener('mouseup', e => {
            if(wireTaskState.activeDragIndex === -1) return;
            let idx = wireTaskState.activeDragIndex;
            let lw = wireTaskState.leftWires[idx];
            
            // 우측 단자 도킹 범위 유효 체크
            wireTaskState.rightWires.forEach((rw, rIdx) => {
                if(wireTaskState.mouseX >= 430 && wireTaskState.mouseX <= 500 && Math.abs(wireTaskState.mouseY - rw.y) < 25) {
                    if(lw.color === rw.color) { // 색상 매치 검사 성공
                        lw.connectedIndex = rIdx; playSound('task');
                    }
                }
            });
            wireTaskState.activeDragIndex = -1;
            renderWireGame();

            // 모든 선 연결 확인 후 성공 처리
            let allDone = wireTaskState.leftWires.every(w => w.connectedIndex !== -1);
            if(allDone) {
                setTimeout(() => {
                    if (currentTaskId === 99) {
                        isHost ? (gameState.isLightsOut = false) : hostConn.send({ type: 'action', action: 'fix_lights_complete' });
                        gameState.isLightsOut = false; broadcastSound('task');
                    } else {
                        myLocalTasks.push(currentTaskId);
                        if(isHost) { gameState.tasksCompleted++; checkWinCondition(); playSound('task'); } else { hostConn.send({ type: 'task_complete' }); }
                    }
                    closeMinigame();
                }, 400);
            }
        });

        function showVotingUI() {
            document.getElementById('voting-ui').style.display = 'flex'; myVote = null;
            const grid = document.getElementById('vote-grid'); grid.innerHTML = '';
            for (let id in gameState.players) {
                const p = gameState.players[id];
                const card = document.createElement('div'); card.className = `vote-card ${p.isDead ? 'dead' : ''}`;
                card.innerHTML = `<div style="display:flex; align-items:center;"><div class="vote-color-box" style="background:${p.color}"></div><span>${p.name}</span></div>`;
                if (!p.isDead && !gameState.players[myId].isDead) card.onclick = () => { document.querySelectorAll('.vote-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); castVote(id); };
                grid.appendChild(card);
            }
        }
        function castVote(tid) { if (myVote || gameState.players[myId].isDead) return; myVote = tid; isHost ? handleVote(myId, tid) : hostConn.send({ type: 'vote', targetId: tid }); }

        function drawMinimap(me) {
            mCtx.clearRect(0,0,160,160); mCtx.fillStyle = 'rgba(10, 12, 18, 0.9)'; mCtx.fillRect(0,0,160,160);
            if(!me) return; const ratio = 160 / WORLD_SIZE;

            // 벽 미로 형태 라인 맵 시각화
            mCtx.fillStyle = '#444c5c';
            walls.forEach(w => mCtx.fillRect(w.x * ratio, w.y * ratio, w.w * ratio, w.h * ratio));

            taskZones.forEach(z => {
                if(z.id === 99 && gameState.isLightsOut) { mCtx.fillStyle = (Math.floor(Date.now()/300) % 2 === 0) ? '#ff4757' : '#2f3542'; } 
                else { mCtx.fillStyle = '#ffa502'; }
                mCtx.fillRect(z.x * ratio, z.y * ratio, z.w * ratio, z.h * ratio);
            });
            mCtx.fillStyle = '#2ed573'; mCtx.beginPath(); mCtx.arc(me.x * ratio, me.y * ratio, 4, 0, Math.PI*2); mCtx.fill();
        }

        function updateUI() {
            document.getElementById('player-list').innerText = `인원수: ${Object.keys(gameState.players).length} / 12 명`;
            document.getElementById('sabotage-alert').style.display = gameState.isLightsOut ? 'block' : 'none';
            if (gameState.phase === 'Lobby') { document.getElementById('host-start-btn').style.display = isHost ? 'block' : 'none'; } 
            else if (gameState.phase === 'Playing') {
                document.getElementById('host-start-btn').style.display = 'none'; document.getElementById('task-bar-container').style.display = 'block';
                if (gameState.tasksTotal > 0) document.getElementById('task-bar-fill').style.width = `${(gameState.tasksCompleted / gameState.tasksTotal) * 100}%`;
                const me = gameState.players[myId]; document.getElementById('report-btn').style.display = (me && !me.isDead && me.inVent === -1) ? 'flex' : 'none';
                if (gameState.imposters.includes(myId)) {
                    document.getElementById('kill-btn').style.display = (me && me.inVent === -1) ? 'flex' : 'none';
                    document.getElementById('sabotage-btn').style.display = 'flex'; document.getElementById('vent-btn').style.display = 'flex'; document.getElementById('task-btn').style.display = 'none';
                    const sabBtn = document.getElementById('sabotage-btn');
                    if (gameState.sabotageCooldown > 0 || gameState.isLightsOut) {
                        sabBtn.classList.add('disabled'); sabBtn.innerHTML = `LIGHTS<br>[ ${Math.ceil(gameState.sabotageCooldown)}s ]`;
                    } else { sabBtn.classList.remove('disabled'); sabBtn.innerHTML = `LIGHTS<br>[ G ]`; }
                } else {
                    document.getElementById('kill-btn').style.display = 'none'; document.getElementById('sabotage-btn').style.display = 'none';
                    document.getElementById('vent-btn').style.display = 'none'; document.getElementById('task-btn').style.display = 'flex';
                }
            }
        }

        let camera = { x: 0, y: 0 };
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 바닥 및 철판 메탈 텍스처
            ctx.fillStyle = '#161922'; ctx.fillRect(-camera.x, -camera.y, WORLD_SIZE, WORLD_SIZE);
            ctx.strokeStyle = '#212533'; ctx.lineWidth = 2;
            let tileSize = 125;
            let startX = Math.max(0, Math.floor(camera.x / tileSize) * tileSize);
            let endX = Math.min(WORLD_SIZE, Math.ceil((camera.x + canvas.width) / tileSize) * tileSize);
            let startY = Math.max(0, Math.floor(camera.y / tileSize) * tileSize);
            let endY = Math.min(WORLD_SIZE, Math.ceil((camera.y + canvas.height) / tileSize) * tileSize);
            
            for (let x = startX; x < endX; x += tileSize) {
                for (let y = startY; y < endY; y += tileSize) {
                    ctx.strokeRect(x - camera.x, y - camera.y, tileSize, tileSize);
                }
            }

            // 은은한 미션 구역 광원
            taskZones.forEach(t => {
                let pulse = 3 * Math.sin(Date.now() / 180);
                let grad = ctx.createRadialGradient(t.x + t.w/2 - camera.x, t.y + t.h/2 - camera.y, 10, t.x + t.w/2 - camera.x, t.y + t.h/2 - camera.y, t.w/1.1 + pulse);
                grad.addColorStop(0, t.color); grad.addColorStop(1, 'transparent');
                ctx.fillStyle = grad; ctx.fillRect(t.x - camera.x - 20, t.y - camera.y - 20, t.w + 40, t.h + 40);
                ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.strokeRect(t.x - camera.x, t.y - camera.y, t.w, t.h);
            });

            // 환풍구 해치
            vents.forEach(v => {
                let vx = v.x - camera.x, vy = v.y - camera.y;
                ctx.fillStyle = '#2d3238'; ctx.beginPath(); ctx.arc(vx, vy, 28, 0, Math.PI*2); ctx.fill();
                ctx.fillStyle = '#0f1115'; ctx.beginPath(); ctx.arc(vx, vy, 24, 0, Math.PI*2); ctx.fill();
                ctx.strokeStyle = '#4b5563'; ctx.lineWidth = 3;
                for(let i = -15; i <= 15; i += 6) {
                    ctx.beginPath(); ctx.moveTo(vx + i, vy - Math.sqrt(576 - i*i)); ctx.lineTo(vx + i, vy + Math.sqrt(576 - i*i)); ctx.stroke();
                }
            });

            // 방 구조를 나타내는 3D 스타일 입체 벽면 렌더링
            walls.forEach(w => {
                let wx = w.x - camera.x, wy = w.y - camera.y;
                ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(wx - 8, wy - 8, w.w + 16, w.h + 16);
                ctx.fillStyle = '#3a4454'; ctx.fillRect(wx, wy, w.w, w.h);
                ctx.fillStyle = '#4e5d73'; ctx.fillRect(wx, wy, w.w, 12);
                ctx.fillStyle = '#2c3542'; ctx.fillRect(wx, wy + w.h - 8, w.w, 8);
                ctx.strokeStyle = '#5d6f8a'; ctx.lineWidth = 2; ctx.strokeRect(wx, wy, w.w, w.h);
            });

            // 시체 아트
            gameState.corpses.forEach(c => {
                let cx = c.x - camera.x, cy = c.y - camera.y;
                ctx.save();
                ctx.fillStyle = c.color; ctx.beginPath(); ctx.arc(cx, cy + 5, 16, Math.PI, 0, false); ctx.fill();
                ctx.fillRect(cx - 16, cy + 5, 32, 10);
                ctx.fillStyle = '#ffffff'; ctx.fillRect(cx - 3, cy - 10, 6, 15);
                ctx.beginPath(); ctx.arc(cx - 3, cy - 10, 4, 0, Math.PI*2); ctx.arc(cx + 3, cy - 10, 4, 0, Math.PI*2); ctx.fill();
                ctx.restore();
            });

            animTimer += 0.15;
            const myPlayer = gameState.players[myId]; const isMyPlayerImposter = gameState.imposters.includes(myId);

            for (let [id, p] of Object.entries(gameState.players)) {
                if (p.isDead || p.inVent !== -1) continue;
                if (gameState.phase === 'Playing' && myPlayer && id !== myId) {
                    if (!checkInSight(myPlayer.x, myPlayer.y, p.x, p.y, isMyPlayerImposter)) continue;
                }
                const rx = p.x - camera.x, ry = p.y - camera.y;
                ctx.save();
                ctx.font = 'bold 16px Nunito'; ctx.textAlign = 'center'; ctx.fillStyle = gameState.imposters.includes(id) && isMyPlayerImposter ? '#ff4757' : 'white';
                ctx.fillText(p.name, rx, ry - 45);
                
                if (playerImg.complete && playerImg.naturalWidth !== 0) {
                    const cols = 5; const rows = 2; const frameWidth = playerImg.width / cols; const frameHeight = playerImg.height / rows;
                    const aspectRatio = frameWidth / frameHeight; const displayHeight = 56; const displayWidth = displayHeight * aspectRatio;
                    let frameIndex = p.isMoving ? Math.floor(animTimer) % 10 : 0;
                    let col = frameIndex % cols; let row = Math.floor(frameIndex / cols);
                    if (p.facing === -1) {
                        ctx.translate(rx, ry); ctx.scale(-1, 1);
                        ctx.drawImage(playerImg, col * frameWidth, row * frameHeight, frameWidth, frameHeight, -(displayWidth / 2), -(displayHeight / 2), displayWidth, displayHeight);
                    } else {
                        ctx.drawImage(playerImg, col * frameWidth, row * frameHeight, frameWidth, frameHeight, rx - (displayWidth / 2), ry - (displayHeight / 2), displayWidth, displayHeight);
                    }
                } else { ctx.fillStyle = p.color; ctx.fillRect(rx - 22, ry - 28, 44, 56); }
                ctx.restore();
            }

            // 시야 암전 필터 레이어
            if (gameState.phase === 'Playing' && myPlayer) {
                ctx.save();
                let currentVisionRadius = (gameState.isLightsOut && !isMyPlayerImposter) ? 110 : 360;
                ctx.fillStyle = gameState.isLightsOut ? 'rgba(0, 0, 0, 0.97)' : 'rgba(0, 0, 0, 0.65)';
                ctx.beginPath(); ctx.rect(0, 0, canvas.width, canvas.height);
                ctx.arc(myPlayer.x - camera.x, myPlayer.y - camera.y, currentVisionRadius, 0, Math.PI * 2, true); ctx.fill(); ctx.restore();
            }
            
            if(gameState.phase === 'Playing' && myPlayer) drawMinimap(myPlayer);
        }

        function mainLoop() {
            const now = Date.now(); const delta = (now - lastTime) / 1000; lastTime = now;
            if (isHost) { 
                if (gameState.phase === 'Playing' && gameState.sabotageCooldown > 0) {
                    gameState.sabotageCooldown -= delta; if (gameState.sabotageCooldown < 0) gameState.sabotageCooldown = 0;
                }
                handleMovement(myId, keys); for (let id in clients) clients[id].send({ type: 'state', state: gameState }); 
            } else if (hostConn && hostConn.open) { hostConn.send({ type: 'input', keys: keys }); }

            const me = gameState.players[myId];
            if (me) { camera.x += (me.x - canvas.width / 2 - camera.x) * 0.1; camera.y += (me.y - canvas.height / 2 - camera.y) * 0.1; }
            updateUI(); draw(); requestAnimationFrame(mainLoop);
        }

        function startGameLoop() { lastTime = Date.now(); requestAnimationFrame(mainLoop); }
    </script>
</body>
