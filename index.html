<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>P2P Among Us - Fixed Aspect Ratio Edition</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght=700;900&display=swap');
        body { margin: 0; background-color: #050505; color: white; font-family: 'Nunito', sans-serif; overflow: hidden; user-select: none; }
        canvas { display: block; }
        
        /* 공통 UI 패널 */
        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 10; }
        .panel { background: rgba(20, 20, 30, 0.95); padding: 40px; border-radius: 20px; border: 3px solid #333; pointer-events: auto; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        h1 { margin-top: 0; color: #ff4757; font-size: 2.5rem; text-shadow: 3px 3px 0 #000; letter-spacing: 2px; }
        
        input { padding: 15px; font-size: 18px; border-radius: 10px; border: 2px solid #555; text-align: center; margin-bottom: 20px; width: 250px; text-transform: uppercase; background: #2f3542; color: white; font-family: 'Nunito', sans-serif; font-weight: bold; outline: none; transition: 0.3s; }
        button { padding: 15px 30px; font-size: 18px; font-weight: 900; background: #1dd1a1; color: white; border: none; border-radius: 10px; cursor: pointer; transition: 0.2s; margin: 5px; text-shadow: 1px 1px 2px rgba(0,0,0,0.5); }
        button:hover { transform: scale(1.05); filter: brightness(1.2); }
        .btn-host { background: #ff4757; }
        
        /* 인게임 UI */
        #game-ui { position: absolute; top: 20px; left: 20px; pointer-events: none; display: none; text-shadow: 2px 2px 4px black; z-index: 5; }
        #room-info { font-size: 20px; color: #1dd1a1; margin-bottom: 5px; }
        #player-list { font-size: 16px; color: #ced6e0; margin-bottom: 15px; }
        #role-info { font-size: 28px; font-weight: 900; margin-bottom: 15px; display: none; }
        #task-bar-container { width: 300px; height: 20px; background: rgba(0,0,0,0.7); border: 2px solid #fff; border-radius: 10px; margin-bottom: 15px; overflow: hidden; display: none; }
        #task-bar-fill { width: 0%; height: 100%; background: #2ed573; transition: width 0.3s; }
        #host-start-btn { pointer-events: auto; display: none; background: #ffa502; margin-top: 10px; }
        
        /* 액션 버튼 */
        #action-container { position: absolute; bottom: 30px; right: 30px; display: flex; gap: 20px; z-index: 5; }
        .action-btn { width: 80px; height: 80px; border-radius: 50%; font-weight: 900; font-size: 16px; display: none; text-align: center; border: 4px solid; color: white; cursor: pointer; pointer-events: auto; transition: 0.2s; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #kill-btn { background: rgba(255, 71, 87, 0.5); border-color: #ff4757; }
        #report-btn { background: rgba(255, 165, 2, 0.5); border-color: #ffa502; }
        #task-btn { background: rgba(46, 213, 115, 0.5); border-color: #2ed573; }
        
        /* 투표 UI */
        #voting-ui { display: none; }
        .vote-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-top: 20px; max-width: 800px; max-height: 500px; overflow-y: auto; padding: 10px; }
        .vote-card { background: #2f3542; padding: 15px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; border: 3px solid transparent; }
        .vote-card:hover:not(.dead) { border-color: #1dd1a1; }
        .vote-card.selected { border-color: #ff4757; background: #473235; }
        .vote-card.dead { opacity: 0.5; pointer-events: none; filter: grayscale(100%); }
        .vote-color-box { width: 20px; height: 20px; border-radius: 5px; margin-right: 10px; }

        /* 미니게임 팝업 UI */
        #minigame-popup { display: none; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #2f3640; padding: 40px; border: 5px solid #1dd1a1; border-radius: 15px; z-index: 100; text-align: center; box-shadow: 0 0 50px rgba(0,0,0,0.9); pointer-events: auto; }
        
        #game-over-ui { display: none; }
        #winner-text { font-size: 4rem; margin-bottom: 30px; }
    </style>
</head>
<body>

    <canvas id="gameCanvas"></canvas>

    <div id="game-ui">
        <div id="room-info"></div>
        <div id="player-list"></div>
        <div id="task-bar-container"><div id="task-bar-fill"></div></div>
        <div id="role-info">대기실 (Lobby)</div>
        <button id="host-start-btn" onclick="hostStartGame()">🚀 게임 시작 (최소 5명)</button>
    </div>

    <div id="action-container">
        <div id="task-btn" class="action-btn">TASK<br>[ E ]</div>
        <div id="report-btn" class="action-btn">REPORT<br>[ R ]</div>
        <div id="kill-btn" class="action-btn">KILL<br>[ SPACE ]</div>
    </div>

    <div id="minigame-popup">
        <h2 style="color: white; margin-top: 0;">🔧 미션 수행 중...</h2>
        <p style="color: #ccc; margin-bottom: 30px;">화면의 버튼을 눌러 작업을 완료하세요!</p>
        <button onclick="finishMinigame()" style="background: #1dd1a1; padding: 20px 40px; font-size: 24px; color: white; border: none; border-radius: 10px; cursor: pointer;">완료하기!</button><br>
        <button onclick="closeMinigame()" style="background: #555; margin-top: 15px; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer;">닫기 (포기)</button>
    </div>

    <div class="overlay" id="menu-ui">
        <div class="panel">
            <h1>P2P AMONG US (5-20 Players)</h1>
            <input type="text" id="nickname" placeholder="닉네임 입력" maxlength="8" value="Player">
            <hr style="border-color:#444; margin: 20px 0;">
            <button class="btn-host" onclick="createRoom()">방 만들기 (호스트)</button><br><br>
            <input type="text" id="room-code" placeholder="입장 코드 5자리" maxlength="5"><br>
            <button onclick="joinRoom()">방 입장 (게스트)</button>
            <div id="status-msg" style="margin-top: 15px; color: #ffa502; font-weight: bold;"></div>
        </div>
    </div>

    <div class="overlay" id="voting-ui">
        <div class="panel" style="width: 800px;">
            <h1 style="color: #ff4757;">🚨 긴급 회의 🚨</h1>
            <div class="vote-grid" id="vote-grid"></div>
            <button onclick="castVote('SKIP')" style="margin-top: 20px; background: #747d8c; width: 100%;">투표 건너뛰기</button>
        </div>
    </div>

    <div class="overlay" id="game-over-ui">
        <div class="panel" style="background: transparent; border: none; box-shadow: none;">
            <div id="winner-text"></div>
        </div>
    </div>

    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <script>
        // --- 1. 이미지 및 애니메이션 기본 설정 ---
        const playerImg = new Image();
        playerImg.src = './1734.png'; // 대소문자 및 경로 주의
        
        let animTimer = 0; 

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        window.addEventListener('resize', resize); resize();

        // 최대 20인 수용 가능한 컬러 백업 스킨 배열
        const COLORS = [
            '#c51111', '#132ed1', '#117f2d', '#ed54ba', '#ef7d0d', 
            '#f5f557', '#3f474e', '#d6e0f0', '#6b2fbb', '#71491e', 
            '#38fedc', '#50ef39', '#751431', '#ffdfcc', '#1e40a6', 
            '#267022', '#7b4097', '#d99d36', '#a1aba3', '#000000'
        ];
        const WORLD_SIZE = 3000;
        
        let peer = null, isHost = false, myId = null, hostConn = null, clients = {};
        
        const walls = [{ x: 500, y: 500, w: 200, h: 600 }, { x: 1200, y: 300, w: 800, h: 200 }, { x: 800, y: 1300, w: 600, h: 200 }];
        const taskZones = [
            { id: 1, x: 800, y: 600, w: 150, h: 150, name: "배선 수리", color: "rgba(46, 213, 115, 0.3)" },
            { id: 2, x: 1500, y: 600, w: 150, h: 150, name: "데이터", color: "rgba(46, 213, 115, 0.3)" }
        ];

        let gameState = { phase: 'Lobby', imposters: [], players: {}, corpses: [], tasksTotal: 0, tasksCompleted: 0, votes: {}, winner: "" };
        let myLocalTasks = [], myVote = null, currentTaskId = null;

        const keys = { w: false, a: false, s: false, d: false };
        window.addEventListener('keydown', e => {
            const k = e.key.toLowerCase();
            if (keys.hasOwnProperty(k)) keys[k] = true;
            if (gameState.phase !== 'Playing' || !myId || !gameState.players[myId] || gameState.players[myId].isDead) return;

            if (k === ' ') sendAction('kill');
            if (k === 'r') sendAction('report');
            if (k === 'e') performTask();
        });
        window.addEventListener('keyup', e => { if (keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });

        function sendAction(a) { isHost ? processAction(myId, a) : hostConn?.send({ type: 'action', action: a }); }

        function createRoom() {
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            peer = new Peer('AMONG-' + code);
            peer.on('open', (id) => {
                isHost = true; myId = id;
                document.getElementById('menu-ui').style.display = 'none'; document.getElementById('game-ui').style.display = 'block';
                document.getElementById('room-info').innerText = `🏠 방 코드: ${code}`;
                addPlayer(myId, document.getElementById('nickname').value || 'Host');
                startGameLoop();
            });
            peer.on('connection', (conn) => {
                if (Object.keys(clients).length >= 19 || gameState.phase !== 'Lobby') {
                    conn.send({ type: 'error', msg: '방이 가득 찼거나 게임이 시작되었습니다.' }); 
                    setTimeout(() => conn.close(), 500); 
                    return;
                }
                conn.on('open', () => {
                    clients[conn.peer] = conn;
                    conn.on('data', (data) => {
                        if (data.type === 'join') addPlayer(conn.peer, data.name);
                        else if (data.type === 'input') handleMovement(conn.peer, data.keys);
                        else if (data.type === 'action') processAction(conn.peer, data.action);
                        else if (data.type === 'vote') handleVote(conn.peer, data.targetId);
                        else if (data.type === 'task_complete') { gameState.tasksCompleted++; checkWinCondition(); }
                    });
                });
                conn.on('close', () => { delete clients[conn.peer]; delete gameState.players[conn.peer]; });
            });
        }

        function joinRoom() {
            let code = document.getElementById('room-code').value.toUpperCase().trim();
            peer = new Peer();
            peer.on('open', (id) => {
                myId = id; hostConn = peer.connect('AMONG-' + code);
                hostConn.on('open', () => {
                    isHost = false; document.getElementById('menu-ui').style.display = 'none'; document.getElementById('game-ui').style.display = 'block';
                    hostConn.send({ type: 'join', name: document.getElementById('nickname').value || 'Crewmate' });
                    startGameLoop();
                });
                hostConn.on('data', (data) => { if (data.type === 'state') updateLocalState(data.state); });
            });
        }

        function addPlayer(id, name) {
            const used = Object.values(gameState.players).map(p => p.color);
            const color = COLORS.find(c => !used.includes(c)) || '#ffffff';
            gameState.players[id] = { x: WORLD_SIZE/2, y: WORLD_SIZE/2, color, name, isDead: false, facing: 1, isMoving: false };
        }

        function hostStartGame() {
            const pIds = Object.keys(gameState.players);
            if (pIds.length < 5) { alert("최소 5명이 모여야 게임을 시작할 수 있습니다! (현재 " + pIds.length + "명)"); return; }

            gameState.phase = 'Playing'; gameState.corpses = []; gameState.votes = {};
            gameState.tasksCompleted = 0; gameState.tasksTotal = pIds.length * taskZones.length;
            
            gameState.imposters = [pIds[Math.floor(Math.random() * pIds.length)]];
            pIds.forEach(id => { gameState.players[id].x = WORLD_SIZE/2 + Math.random()*200; gameState.players[id].isDead = false; });
        }

        function handleMovement(id, k) {
            const p = gameState.players[id];
            if (!p || p.isDead || gameState.phase !== 'Playing') return;
            let dx = 0, dy = 0, speed = 7;
            if (k.w) dy -= speed; if (k.s) dy += speed;
            if (k.a) { dx -= speed; p.facing = -1; } if (k.d) { dx += speed; p.facing = 1; }
            if (dx !== 0 && dy !== 0) { dx *= 0.707; dy *= 0.707; }
            p.x += dx; p.y += dy; 
            p.isMoving = (dx !== 0 || dy !== 0); 
        }

        function processAction(id, action) {
            const p = gameState.players[id];
            if (!p || p.isDead) return;
            if (action === 'kill' && gameState.imposters.includes(id)) {
                for (let tId in gameState.players) {
                    if (tId !== id && !gameState.players[tId].isDead && !gameState.imposters.includes(tId) && Math.hypot(p.x - gameState.players[tId].x, p.y - gameState.players[tId].y) < 120) {
                        gameState.players[tId].isDead = true;
                        gameState.corpses.push({ x: gameState.players[tId].x, y: gameState.players[tId].y });
                        checkWinCondition(); break;
                    }
                }
            } else if (action === 'report') {
                for (let c of gameState.corpses) if (Math.hypot(p.x - c.x, p.y - c.y) < 150) { startMeeting(); break; }
            }
        }

        function checkWinCondition() {
            let aliveCrew = 0, aliveImps = 0;
            for (let id in gameState.players) { if (!gameState.players[id].isDead) gameState.imposters.includes(id) ? aliveImps++ : aliveCrew++; }
            if (aliveImps === 0) triggerGameOver("CREWMATE WIN");
            else if (aliveImps >= aliveCrew) triggerGameOver("IMPOSTER WIN");
            else if (gameState.tasksCompleted >= gameState.tasksTotal) triggerGameOver("TASK WIN");
        }
        function triggerGameOver(text) { gameState.phase = 'GameOver'; gameState.winner = text; setTimeout(() => { gameState.phase = 'Lobby'; myLocalTasks = []; }, 5000); }

        function startMeeting() {
            gameState.phase = 'Voting'; gameState.votes = {};
            for (let id in gameState.players) if (!gameState.players[id].isDead) { gameState.players[id].x = WORLD_SIZE/2; gameState.players[id].y = WORLD_SIZE/2; }
            setTimeout(() => { if (gameState.phase === 'Voting') tallyVotes(); }, 15000);
        }

        function handleVote(voterId, targetId) {
            if (!gameState.votes[voterId]) {
                gameState.votes[voterId] = targetId;
                if (Object.keys(gameState.votes).length >= Object.values(gameState.players).filter(p=>!p.isDead).length) tallyVotes();
            }
        }

        function tallyVotes() {
            let counts = {}; for (let v in gameState.votes) counts[gameState.votes[v]] = (counts[gameState.votes[v]] || 0) + 1;
            let max = 0, ejected = null;
            for (let id in counts) if (counts[id] > max) { max = counts[id]; ejected = id; }
            if (ejected && ejected !== 'SKIP') gameState.players[ejected].isDead = true;
            gameState.corpses = []; checkWinCondition(); if (gameState.phase === 'Voting') gameState.phase = 'Playing';
        }

        function updateLocalState(newState) {
            const oldPhase = gameState.phase; gameState = newState;
            if (oldPhase !== 'Voting' && gameState.phase === 'Voting') showVotingUI();
            if (oldPhase === 'Voting' && gameState.phase === 'Playing') document.getElementById('voting-ui').style.display = 'none';
            if (gameState.phase === 'GameOver') { document.getElementById('game-over-ui').style.display = 'flex'; document.getElementById('winner-text').innerText = gameState.winner; document.getElementById('voting-ui').style.display = 'none'; }
            if (gameState.phase === 'Lobby') document.getElementById('game-over-ui').style.display = 'none';
        }

        function performTask() {
            const me = gameState.players[myId];
            if (gameState.imposters.includes(myId) || me.isDead) return;
            for (let t of taskZones) {
                if (!myLocalTasks.includes(t.id) && me.x > t.x && me.x < t.x+t.w && me.y > t.y && me.y < t.y+t.h) {
                    document.getElementById('minigame-popup').style.display = 'block'; 
                    currentTaskId = t.id; break;
                }
            }
        }
        function finishMinigame() {
            if (currentTaskId !== null) {
                myLocalTasks.push(currentTaskId);
                isHost ? (gameState.tasksCompleted++, checkWinCondition()) : hostConn.send({ type: 'task_complete' });
                closeMinigame();
            }
        }
        function closeMinigame() { document.getElementById('minigame-popup').style.display = 'none'; currentTaskId = null; }

        function showVotingUI() {
            document.getElementById('voting-ui').style.display = 'flex'; myVote = null;
            const grid = document.getElementById('vote-grid'); grid.innerHTML = '';
            for (let id in gameState.players) {
                const p = gameState.players[id];
                const card = document.createElement('div'); card.className = `vote-card ${p.isDead ? 'dead' : ''}`;
                card.innerHTML = `<div style="display:flex; align-items:center;"><div class="vote-color-box" style="background:${p.color}"></div><span>${p.name}</span></div>`;
                if (!p.isDead && !gameState.players[myId].isDead) card.onclick = () => { document.querySelectorAll('.vote-card').forEach(c=>c.classList.remove('selected')); card.classList.add('selected'); castVote(id); };
                grid.appendChild(card);
            }
        }
        function castVote(tid) { if (myVote || gameState.players[myId].isDead) return; myVote = tid; isHost ? handleVote(myId, tid) : hostConn.send({ type: 'vote', targetId: tid }); }

        function updateUI() {
            document.getElementById('player-list').innerText = `인원수: ${Object.keys(gameState.players).length} / 20 명`;
            if (gameState.phase === 'Lobby') {
                document.getElementById('host-start-btn').style.display = isHost ? 'block' : 'none';
            } else if (gameState.phase === 'Playing') {
                document.getElementById('host-start-btn').style.display = 'none';
                document.getElementById('task-bar-container').style.display = 'block';
                if (gameState.tasksTotal > 0) document.getElementById('task-bar-fill').style.width = `${(gameState.tasksCompleted / gameState.tasksTotal) * 100}%`;
                
                if (gameState.imposters.includes(myId)) { document.getElementById('kill-btn').style.display = 'flex'; document.getElementById('report-btn').style.display = 'flex'; }
                else { document.getElementById('task-btn').style.display = 'flex'; document.getElementById('report-btn').style.display = 'flex'; }
            }
        }

        let camera = { x: 0, y: 0 };
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#1e272e'; ctx.fillRect(-camera.x, -camera.y, WORLD_SIZE, WORLD_SIZE);
            
            taskZones.forEach(t => { ctx.fillStyle = t.color; ctx.fillRect(t.x - camera.x, t.y - camera.y, t.w, t.h); });

            // 타이머 업데이트 (애니메이션 구동용)
            animTimer += 0.15;

            for (let [id, p] of Object.entries(gameState.players)) {
                if (p.isDead) continue;
                const rx = p.x - camera.x, ry = p.y - camera.y;
                
                ctx.save();
                ctx.font = 'bold 16px Nunito'; ctx.textAlign = 'center'; ctx.fillStyle = 'white';
                // 캐릭터 높이에 맞춰 닉네임 위치 보정
                ctx.fillText(p.name, rx, ry - 45);
                
                // --- 5x2 비율 교정 스프라이트 렌더링 ---
                if (playerImg.complete && playerImg.naturalWidth !== 0) {
                    const cols = 5;
                    const rows = 2;
                    
                    // 1칸의 순수 원본 크기 계산
                    const frameWidth = playerImg.width / cols; 
                    const frameHeight = playerImg.height / rows;
                    
                    // 세로 대비 가로 비율(Aspect Ratio) 추출
                    const aspectRatio = frameWidth / frameHeight;
                    
                    // 세로를 60px로 고정하고 가로는 비율에 맞춤으로써 찌그러짐 방지!
                    const displayHeight = 60;
                    const displayWidth = displayHeight * aspectRatio;

                    // 프레임 위치 매핑
                    let frameIndex = p.isMoving ? Math.floor(animTimer) % 10 : 0;
                    let col = frameIndex % cols;
                    let row = Math.floor(frameIndex / cols);
                    
                    let cutX = col * frameWidth;
                    let cutY = row * frameHeight;

                    if (p.facing === -1) {
                        ctx.translate(rx, ry);
                        ctx.scale(-1, 1);
                        ctx.drawImage(playerImg, cutX, cutY, frameWidth, frameHeight, -(displayWidth / 2), -(displayHeight / 2), displayWidth, displayHeight);
                    } else {
                        ctx.drawImage(playerImg, cutX, cutY, frameWidth, frameHeight, rx - (displayWidth / 2), ry - (displayHeight / 2), displayWidth, displayHeight);
                    }
                } else {
                    // 이미지 소스 유실 대비용 폴백 박스
                    ctx.fillStyle = p.color; ctx.fillRect(rx - 25, ry - 30, 50, 60);
                }
                ctx.restore();
            }
        }

        function mainLoop() {
            if (isHost) { handleMovement(myId, keys); for (let id in clients) clients[id].send({ type: 'state', state: gameState }); }
            else if (hostConn && hostConn.open) { hostConn.send({ type: 'input', keys: keys }); }

            const me = gameState.players[myId];
            if (me) { camera.x += (me.x - canvas.width / 2 - camera.x) * 0.1; camera.y += (me.y - canvas.height / 2 - camera.y) * 0.1; }

            updateUI(); draw(); requestAnimationFrame(mainLoop);
        }

        function startGameLoop() { requestAnimationFrame(mainLoop); }
    </script>
</body>
</html>
