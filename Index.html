<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Among Us Clone - High Quality</title>
    <style>
        body {
            margin: 0;
            background-color: #111;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
        }
        canvas {
            border: 4px solid #000;
            border-radius: 10px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.8);
            background-color: #3b3b42;
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 30px;
            pointer-events: none;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div id="ui">
        <h2>어몽어스 (카메라 & 애니메이션 적용)</h2>
        <p>조작: 방향키 또는 WASD</p>
    </div>

    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 게임 월드(맵) 크기 설정
        const WORLD_WIDTH = 2000;
        const WORLD_HEIGHT = 2000;

        // 키 입력 상태 관리
        const keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 플레이어 클래스
        class Player {
            constructor(x, y, color) {
                this.x = x;
                this.y = y;
                this.color = color;
                this.width = 44;
                this.height = 55;
                this.speed = 6;
                this.direction = 'right';
                this.isMoving = false;
                this.walkCycle = 0; // 애니메이션용 타이머
            }

            update() {
                let dx = 0;
                let dy = 0;

                if (keys['arrowright'] || keys['d']) { dx = this.speed; this.direction = 'right'; }
                if (keys['arrowleft'] || keys['a']) { dx = -this.speed; this.direction = 'left'; }
                if (keys['arrowup'] || keys['w']) dy = -this.speed;
                if (keys['arrowdown'] || keys['s']) dy = this.speed;

                this.isMoving = (dx !== 0 || dy !== 0);

                // 대각선 이동 속도 보정
                if (dx !== 0 && dy !== 0) {
                    dx *= 0.7071;
                    dy *= 0.7071;
                }

                this.x += dx;
                this.y += dy;

                // 맵 경계선 충돌 처리
                this.x = Math.max(0, Math.min(this.x, WORLD_WIDTH - this.width));
                this.y = Math.max(0, Math.min(this.y, WORLD_HEIGHT - this.height));

                // 걷기 애니메이션 주기 업데이트
                if (this.isMoving) {
                    this.walkCycle += 0.25; // 걷는 속도 조절
                } else {
                    this.walkCycle = 0; // 멈추면 초기화
                }
            }

            draw(ctx, cameraX, cameraY) {
                // 화면상의 렌더링 좌표 계산 (실제 좌표 - 카메라 좌표)
                const renderX = this.x - cameraX;
                const renderY = this.y - cameraY;

                // 들썩거림 효과 계산 (Sine 함수 사용)
                const bounce = this.isMoving ? Math.abs(Math.sin(this.walkCycle)) * 6 : 0;
                const leg1Offset = this.isMoving ? Math.max(0, Math.sin(this.walkCycle)) * 8 : 0;
                const leg2Offset = this.isMoving ? Math.max(0, -Math.sin(this.walkCycle)) * 8 : 0;

                ctx.save();
                
                // 1. 그림자 (몸이 위로 뜰수록 그림자가 미세하게 작아짐)
                const shadowScale = 1 - (bounce * 0.02);
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(renderX + this.width / 2, renderY + this.height + 15, (this.width / 1.4) * shadowScale, 8 * shadowScale, 0, 0, Math.PI * 2);
                ctx.fill();

                // 렌더링 중심점을 몸통으로 이동 (들썩임 적용)
                ctx.translate(renderX, renderY - bounce);

                ctx.lineWidth = 4;
                ctx.strokeStyle = 'black';

                // 2. 백팩 (산소통)
                ctx.fillStyle = this.color;
                ctx.beginPath();
                if (this.direction === 'right') {
                    ctx.roundRect(-12, 10, 20, 35, 10);
                } else {
                    ctx.roundRect(this.width - 8, 10, 20, 35, 10);
                }
                ctx.fill(); ctx.stroke();

                // 3. 다리 (애니메이션 적용)
                ctx.fillStyle = this.color;
                // 왼쪽 다리
                ctx.beginPath();
                ctx.roundRect(5, this.height - 10 - leg1Offset, 14, 25, 7);
                ctx.fill(); ctx.stroke();
                // 오른쪽 다리
                ctx.beginPath();
                ctx.roundRect(this.width - 19, this.height - 10 - leg2Offset, 14, 25, 7);
                ctx.fill(); ctx.stroke();

                // 4. 몸통
                ctx.fillStyle = this.color;
                ctx.beginPath();
                ctx.roundRect(0, 0, this.width, this.height, 22);
                ctx.fill(); ctx.stroke();

                // 5. 고글 (바이저)
                ctx.fillStyle = '#83c2d4'; // 메인 유리색
                ctx.beginPath();
                const goggleX = this.direction === 'right' ? 12 : -6;
                ctx.roundRect(goggleX, 10, 38, 22, 11);
                ctx.fill(); ctx.stroke();

                // 고글 하이라이트 (빛 반사)
                ctx.fillStyle = '#d3eef5';
                ctx.beginPath();
                const highlightX = this.direction === 'right' ? 35 : 17;
                ctx.ellipse(highlightX, 16, 8, 4, -0.2, 0, Math.PI * 2);
                ctx.fill();

                ctx.restore();
            }
        }

        // 게임 초기화
        const player = new Player(WORLD_WIDTH / 2, WORLD_HEIGHT / 2, '#c51111');

        // 카메라 초기화 (화면 중심점)
        let camera = { x: 0, y: 0 };

        // 바닥 타일 그리기 (우주선 느낌)
        function drawMap(ctx, cameraX, cameraY) {
            const tileSize = 100;
            
            // 카메라 위치에 따라 타일 시작점 계산
            const startCol = Math.floor(cameraX / tileSize);
            const endCol = startCol + (canvas.width / tileSize) + 1;
            const startRow = Math.floor(cameraY / tileSize);
            const endRow = startRow + (canvas.height / tileSize) + 1;

            ctx.lineWidth = 2;
            ctx.strokeStyle = '#2b2b30'; // 타일 경계선 색상

            for (let c = startCol; c <= endCol; c++) {
                for (let r = startRow; r <= endRow; r++) {
                    const tileX = c * tileSize - cameraX;
                    const tileY = r * tileSize - cameraY;

                    // 맵 바깥 영역은 어둡게 처리
                    if (c * tileSize < 0 || c * tileSize >= WORLD_WIDTH || 
                        r * tileSize < 0 || r * tileSize >= WORLD_HEIGHT) {
                        ctx.fillStyle = '#111';
                    } else {
                        // 체크무늬 패턴
                        ctx.fillStyle = (c + r) % 2 === 0 ? '#45454d' : '#4a4a52';
                    }
                    
                    ctx.fillRect(tileX, tileY, tileSize, tileSize);
                    ctx.strokeRect(tileX, tileY, tileSize, tileSize);
                }
            }
        }

        // 메인 게임 루프
        function gameLoop() {
            // 로직 업데이트
            player.update();

            // 카메라가 플레이어를 중앙에 맞추도록 부드럽게 따라감 (Lerp)
            const targetCameraX = player.x + player.width / 2 - canvas.width / 2;
            const targetCameraY = player.y + player.height / 2 - canvas.height / 2;
            
            camera.x += (targetCameraX - camera.x) * 0.1;
            camera.y += (targetCameraY - camera.y) * 0.1;

            // 렌더링
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawMap(ctx, camera.x, camera.y);
            player.draw(ctx, camera.x, camera.y);

            requestAnimationFrame(gameLoop);
        }

        // 게임 시작
        gameLoop();
    </script>
</body>
</html>
